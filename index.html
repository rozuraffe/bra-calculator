<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="서서 잰 윗가슴둘레, 90도로 숙여 잰 윗가슴둘레와 밑가슴둘레를 이용하는 브라 사이즈 계산기입니다."
    >

    <title>브라 사이즈 계산기</title>

    <link
        rel="stylesheet"
        href="style.css?v=20"
    >
</head>

<body>

    <!-- ==================================================
         첫 화면
         PC에서는 결과까지 한 화면에 표시
    =================================================== -->

    <main class="first-screen">

        <!-- 제목 -->
        <header class="page-header">
            <h1>브라 사이즈 계산기</h1>

            <p class="warning">
                반드시 맨몸으로 측정하고,
                줄자가 수평인지 확인하세요.
            </p>
        </header>


        <!-- 왼쪽 만화 · 가운데 계산기 · 오른쪽 만화 -->
        <div class="main-layout">

            <!-- 왼쪽: 사이즈 측정법 -->
            <aside class="side-guide left-guide">
                <img
                    class="side-image"
                    src="로쥬브라_사이즈재는법.png"
                    alt="브라 사이즈 측정 방법 4컷 만화"
                >
            </aside>


            <!-- 가운데: 계산기 -->
            <section class="calculator">

                <!-- 치수 입력 -->
                <div class="measurement-list">

                    <div class="measurement-row">
                        <label for="standingBust">
                            서서 잰 윗가슴둘레
                        </label>

                        <div class="number-field">
                            <input
                                id="standingBust"
                                type="number"
                                min="0"
                                step="0.1"
                                inputmode="decimal"
                                autocomplete="off"
                                aria-label="서서 잰 윗가슴둘레"
                            >
                            <span>cm</span>
                        </div>
                    </div>


                    <div class="measurement-row">
                        <label for="leaningBust">
                            90도로 숙여 잰 윗가슴둘레
                        </label>

                        <div class="number-field">
                            <input
                                id="leaningBust"
                                type="number"
                                min="0"
                                step="0.1"
                                inputmode="decimal"
                                autocomplete="off"
                                aria-label="90도로 숙여 잰 윗가슴둘레"
                            >
                            <span>cm</span>
                        </div>
                    </div>


                    <div class="measurement-row">
                        <label for="underBust">
                            살짝 타이트한 밑가슴둘레
                        </label>

                        <div class="number-field">
                            <input
                                id="underBust"
                                type="number"
                                min="0"
                                step="0.1"
                                inputmode="decimal"
                                autocomplete="off"
                                aria-label="살짝 타이트하게 잰 밑가슴둘레"
                            >
                            <span>cm</span>
                        </div>
                    </div>

                </div>


                <!-- 체형 특징 -->
                <fieldset class="shape-options">
                    <legend>해당하는 특징을 선택하세요</legend>

                    <label class="check-row">
                        <input
                            id="pigeonChest"
                            type="checkbox"
                        >
                        <span>새가슴 또는 돌출된 흉곽</span>
                    </label>

                    <label class="check-row">
                        <input
                            id="upperFull"
                            type="checkbox"
                        >
                        <span>윗가슴이 많은 편</span>
                    </label>

                    <label class="check-row">
                        <input
                            id="centerFull"
                            type="checkbox"
                        >
                        <span>안쪽 가슴이 많은 편</span>
                    </label>
                </fieldset>


                <!-- 버튼 -->
                <div class="buttons">
                    <button
                        id="calculateButton"
                        class="calculate-button"
                        type="button"
                    >
                        계산하기
                    </button>

                    <button
                        id="resetButton"
                        class="reset-button"
                        type="button"
                    >
                        초기화
                    </button>
                </div>


                <!-- 결과 -->
                <section
                    class="result-area"
                    aria-live="polite"
                >
                    <h2 id="resultTitle">
                        추천 사이즈
                    </h2>

                    <div
                        id="resultSize"
                        class="result-size"
                    >
                        —
                    </div>

                    <p
                        id="errorMessage"
                        class="error-message"
                    ></p>
                </section>

            </section>


            <!-- 오른쪽: 체형 보는 법 -->
            <aside class="side-guide right-guide">
                <img
                    class="side-image"
                    src="로쥬브라_체형보는법.png"
                    alt="가슴 체형을 구분하는 방법 4컷 만화"
                >
            </aside>

        </div>

    </main>


    <!-- ==================================================
         첫 화면 아래
         여기부터는 스크롤해서 확인
    =================================================== -->

<section class="country-guide-section">


    <img
        class="country-guide-image desktop-guide"
        src="로쥬브라_나라별브라사이즈_데스크.png"
        alt="나라별 브라 사이즈 안내"
    >


    <img
        class="country-guide-image mobile-guide"
        src="로쥬브라_나라별브라사이즈_모바일.png"
        alt="나라별 브라 사이즈 안내"
    >

</section>

    <script src="script.js?v=20"></script>
</body>
</html>
